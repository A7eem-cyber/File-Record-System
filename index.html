<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Professional Website</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Glassmorphism Effect for the card */
        .card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            width: 90%;
            animation: fadeIn 1.5s ease-out;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #94a3b8;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        /* Button Styling */
        .btn {
            background: #38bdf8;
            color: #0f172a;
            padding: 12px 25px;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            background: #818cf8;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(56, 189, 248, 0.3);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Moving Background Shapes (Visual enhancement) */
        .bg-shape {
            position: absolute;
            z-index: -1;
            filter: blur(80px);
            border-radius: 50%;
        }
        .shape1 { width: 300px; height: 300px; background: #38bdf8; top: -10%; left: -10%; opacity: 0.2; }
        .shape2 { width: 400px; height: 400px; background: #818cf8; bottom: -10%; right: -10%; opacity: 0.2; }
    </style>
</head>
<body>

    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>

    <div class="card">
        <h1 id="main-title">Hello World!</h1>
        <p>Yeh meri pehli professional website hai jo GitHub Pages par live hai. Is mein HTML, CSS aur JS ka complete combo hai.</p>
        
        <button class="btn" onclick="magicAction()">Click For Magic</button>
        
        <div id="result" style="margin-top: 20px; font-weight: 500;"></div>
    </div>

    <script>
        function magicAction() {
            // Title change karega
            const title = document.getElementById('main-title');
            title.innerText = "Coding is Life!";
            title.style.background = "linear-gradient(to right, #f472b6, #fb923c)";
            title.style.webkitBackgroundClip = "text";

            // Result message show karega
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = "✨ JavaScript ne style change kar diya! ✨";
            
            // Celebration in console
            console.log("Magic button clicked successfully!");
            
            // Button ka text bhi change kar dete hain
            document.querySelector('.btn').innerText = "Working!";
        }
    </script>

</body>
</html>
