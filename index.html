<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Web App</title>
    <style>
        /* --- PROFESSIONAL CSS (RESPONSIVE) --- */
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --bg: #050a18;
            --card-bg: #111a2e;
            --text: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        /* Full Height Header */
        header {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            background: radial-gradient(circle at center, #112240 0%, #050a18 100%);
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 4.5rem); /* Mobile par chota, Laptop par bada */
            margin-bottom: 20px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            font-size: 1.2rem;
            color: #8892b0;
            max-width: 700px;
            margin-bottom: 40px;
        }

        /* Professional Form Section (Lazmi Entry) */
        .form-container {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid rgba(0, 210, 255, 0.1);
        }

        .form-container h2 {
            margin-bottom: 25px;
            font-size: 1.5rem;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--primary);
            font-size: 0.9rem;
        }

        /* "Required" input styling */
        input {
            width: 100%;
            padding: 12px 15px;
            background: #1d2d50;
            border: 2px solid transparent;
            border-radius: 8px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--primary);
        }

        /* Valid/Invalid state highlight */
        input:invalid:focus {
            border-color: #ff4d4d;
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.4s;
        }

        .btn-submit:hover {
            filter: brightness(1.2);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.3);
        }

        /* Footer */
        footer {
            padding: 50px;
            text-align: center;
            background: #020617;
            font-size: 0.9rem;
            color: #4b5563;
        }

        /* Mobile specific adjustments */
        @media (max-width: 768px) {
            .form-container {
                padding: 25px;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Next Gen Web</h1>
        <p class="subtitle">Experience the power of modern web development. Responsive on every device.</p>

        <div class="form-container">
            <h2>Join the Community</h2>
            <form
