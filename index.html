<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Record Dept | File Tracking System</title>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #3b82f6;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #1e293b;
            --danger: #ef4444;
            --success: #22c55e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body { background-color: var(--bg); color: var(--text); padding: 20px; }

        /* Professional Header */
        header {
            background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
            color: white;
            padding: 30px;
            text-align: center;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .container { max-width: 1100px; margin: 0 auto; }

        /* Form Styling (Compulsory Fields) */
        .form-card {
            background: var(--card);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 40px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .input-group { margin-bottom: 15px; }

        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.9rem; }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }

        .btn-add {
            grid-column: 1 / -1;
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-add:hover { background: #1d4ed8; }

        /* Professional Table Styling */
        .table-container {
            background: var(--card);
            border-radius: 12px;
            overflow-x: auto;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        table { width: 100%; border-collapse: collapse; min-width: 800px; }

        th { background: #f8fafc; padding: 15px; text-align: left; border-bottom: 2px solid #e2e8f0; font-size: 0.85rem; text-transform: uppercase; }

        td { padding: 15px; border-bottom: 1px solid #e2e8f0; font-size: 0.95rem; }

        .status-in { color: var(--success); font-weight: bold; background: #dcfce7; padding: 4px 8px; border-radius: 4px; }
        .status-out { color: var(--danger); font-weight: bold; background: #fee2e2; padding: 4px 8px; border-radius: 4px; }

        @media (max-width: 768px) {
            header h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Record Department Tracking System</h1>
        <p>File In/Out Management Portal</p>
    </header>

    <div class="form-card">
        <h2 style="margin-bottom: 15px; font-size: 1.2rem;">New Entry (All Fields Compulsory)</h2>
        <form id="fileForm" class="form-grid">
            <div class="input-group">
                <label>File Number *</label>
                <input type="text" id="fileNo" placeholder="e.g. RD-405" required>
            </div>
            <div class="input-group">
                <label>File Subject/Name *</label>
                <input type="text" id="fileName" placeholder="e.g. Accounts 2024" required>
            </div>
            <div class="input-group">
                <label>Department/Officer *</label>
                <input type="text" id="dept" placeholder="Receiver Name" required>
            </div>
            <div class="input-group">
                <label>Status *</label>
                <select id="status" required>
                    <option value="">-- Select Status --</option>
                    <option value="IN">File IN (Returned)</option>
                    <option value="OUT">File OUT (Issued)</option>
                </select>
            </div>
            <div class="input-group">
                <label>Date *</label>
                <input type="date" id="entryDate" required>
            </div>
            <button type="submit" class="btn-add">Add to Records</button>
        </form>
    </div>

    <div class="table-container">
        <table id="recordTable">
            <thead>
                <tr>
                    <th>File No</th>
                    <th>File Name</th>
                    <th>Issued To / By</th>
                    <th>Status</th>
                    <th>Date</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>RD-101</td>
                    <td>Land Registry Docs</td>
                    <td>Admin Office</td>
                    <td><span class="status-out">OUT</span></td>
                    <td>2026-04-28</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const form = document.getElementById('fileForm');
    const table = document.getElementById('recordTable').getElementsByTagName('tbody')[0];

    form.addEventListener('submit', function(e) {
        e.preventDefault();

        // Get values
        const fileNo = document.getElementById('fileNo').value;
        const fileName = document.getElementById('fileName').value;
        const dept = document.getElementById('dept').value;
        const status = document.getElementById('status').value;
        const date = document.getElementById('entryDate').value;

        // Create new row
        const newRow = table.insertRow(0);

        const cell1 = newRow.insertCell(0);
        const cell2 = newRow.insertCell(1);
        const cell3 = newRow.insertCell(2);
        const cell4 = newRow.insertCell(3);
        const cell5 = newRow.insertCell(4);

        cell1.innerHTML = fileNo;
        cell2.innerHTML = fileName;
        cell3.innerHTML = dept;
        cell4.innerHTML = `<span class="${status === 'IN' ? 'status-in' : 'status-out'}">${status}</span>`;
        cell5.innerHTML = date;

        // Clear form
        form.reset();
        alert("Record updated successfully!");
    });
</script>

</body>
</html>
