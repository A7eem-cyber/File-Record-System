<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CITI HOUSING JHELUM | File Record</title>
    <style>
        /* --- CITI HOUSING PREMIUM THEME --- */
        :root {
            --citi-gold: #b38b00;
            --citi-blue: #0c2340;
            --bg-light: #f4f7f6;
            --white: #ffffff;
            --text-dark: #333333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }

        body { background-color: var(--bg-light); color: var(--text-dark); padding: 30px 15px; }

        .container { max-width: 1250px; margin: 0 auto; }

        /* Branding Header */
        header {
            background: var(--white);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            border-top: 6px solid var(--citi-gold);
        }

        header h1 { 
            color: var(--citi-blue); 
            font-size: 2.2rem; 
            letter-spacing: 1px; 
            text-transform: uppercase;
        }

        header p { color: var(--citi-gold); font-weight: 600; margin-top: 5px; }

        /* Entry Form Section */
        .form-card {
            background: var(--white);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            margin-bottom: 35px;
        }

        .grid-inputs {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
        }

        .field { display: flex; flex-direction: column; }

        label { font-size: 0.85rem; font-weight: 700; color: #555; margin-bottom: 8px; }

        input, select {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus, select:focus { border-color: var(--citi-gold); box-shadow: 0 0 8px rgba(179, 139, 0, 0.2); }

        /* Reg No Required Styling */
        input#regNo { border-left: 5px solid var(--citi-gold); background: #fffdf5; }

        .btn-save {
            background: var(--citi-blue);
            color: white;
            padding: 14px 40px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 25px;
            font-size: 1rem;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(12, 35, 64, 0.2);
        }

        .btn-save:hover { background: var(--citi-gold); transform: translateY(-2px); }
