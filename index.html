<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Record Management System | Professional</title>
    <style>
        :root { --primary: #00d2ff; --bg: #0b1120; --card: #1e293b; --text: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 15px; min-height: 100vh; }
        .wrapper { max-width: 1300px; margin: 0 auto; width: 100%; }
        
        header { 
            background: linear-gradient(135deg, #1e40af, #00d2ff); 
            padding: 30px; 
            border-radius: 15px; 
            text-align: center; 
            margin-bottom: 20px; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.4); 
        }

        .form-section { 
            background: var(--card); 
            padding: 25px; 
            border-radius: 15px; 
            margin-bottom: 25px; 
            border: 1px solid rgba(255,255,255,0.1); 
        }

        .grid-inputs { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); 
            gap: 15px; 
            margin-bottom: 20px; 
        }

        label { display: block; margin-bottom: 6px; font-size: 0.85rem; color: #38bdf8; font-weight: 600; }
        
        input, select { 
            width: 100%; 
            padding: 10px; 
            border-radius: 8px; 
            border: 1px solid #334155; 
            background: #0f172a; 
            color: white; 
            outline: none; 
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 5px rgba(0, 210, 255, 0.3); }

        /* Compulsory field highlight */
        input.compulsory { border-left: 4px solid #38bdf8; }

        .btn { 
            width: 100%; 
            padding: 15px; 
            background: var(--primary); 
            color: #0f172a; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 1rem; 
            transition: 0.3s; 
            text-transform: uppercase;
        }

        .btn:hover { background: #fff; transform: translateY(-2px); }

        .table-container { 
            background: var(--card); 
            border-radius: 15px; 
            overflow-x: auto; 
            border: 1px solid rgba(255,255,255,0.1); 
        }

        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { text-align: left; padding: 15px; background: #0f172a; color: #38bdf8; font-size: 0.8rem; text-transform: uppercase; }
        td { padding: 12px 15px; border-bottom: 1px solid #334155; font-size: 0.9rem; }
        
        .status-in { color: #4ade80; font-weight: bold; background: rgba(74, 222, 128, 0.1); padding: 4px 8px; border-radius: 5px; }
        .status-out { color: #f87171; font-weight: bold; background: rgba(248, 113, 113, 0.1); padding: 4px 8px; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="wrapper">
        <header>
            <h1>RECORD TRACKING DASHBOARD</h1>
            <p>Real-time File, Plot & Street Management System</p>
        </header>

        <section class="form-section">
            <form id="recordForm">
                <div class="grid-inputs">
                    <div><label>Reg/File No * (Lazmi)</label><input type="text" id="fNo" class="compulsory" required></div>
                    
                    <div><label>Block</label><input type="text" id="fBlock"></div>
                    <div><label>Street #</label><input type="text" id="fStreet"></div>
                    <div><label>Plot #</label><input type="text" id="fPlot"></div>
                    <div><label>Receiver/Dept</label><input type="text" id="fDept"></div>
                    <div>
                        <label>Status</label>
                        <select id="fStatus">
                            <option value="IN">FILE IN</option>
                            <option value="OUT">FILE OUT</option>
                        </select>
                    </div>
                    <div><label>Date</label><input type="date" id="fDate"></div>
                </div>
                <button type="submit" class="btn">Add Entry to Records</button>
            </form>
        </section>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Reg No</th>
                        <th>Block</th>
                        <th>Street #</th>
                        <th>Plot #</th>
                        <th>Receiver/Dept</th>
                        <th>Status</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        const form = document.getElementById('recordForm');
        const tableBody = document.getElementById('tableBody');

        // Memory load (taake data refresh pe gayab na ho)
        window.onload = () => {
            const saved = JSON.parse(localStorage.getItem('myOfficeRecords')) || [];
            saved.reverse().forEach(data => addRow(data));
        };

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const record = {
                no: document.getElementById('fNo').value,
                block: document.getElementById('fBlock').value || '-',
                street: document.getElementById('fStreet').value || '-',
                plot: document.getElementById('fPlot').value || '-',
                dept: document.getElementById('fDept').value || '-',
                status: document.getElementById('fStatus').value,
                date: document.getElementById('fDate').value || 'N/A'
            };
            addRow(record, true); // True means add to top
            saveToMemory(record);
            form.reset();
        });

        function addRow(data, isNew = false) {
            const rowHtml = `<tr>
                <td style="font-weight:bold; color:#38bdf8;">${data.no}</td>
